<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paste to Markdown</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .instructions {
            color: #a0a0b0;
            margin-bottom: 1.5rem;
            text-align: center;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .paste-area {
            width: 100%;
            min-height: 200px;
            background: #16213e;
            border: 2px dashed #4a4a6a;
            border-radius: 8px;
            padding: 1.5rem;
            color: #e0e0e0;
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            transition: border-color 0.2s;
            overflow: auto;
        }

        .paste-area:focus {
            border-color: #6c63ff;
        }

        .paste-area.drag-over {
            border-color: #6c63ff;
            background: #1a2744;
        }

        .paste-area:empty::before {
            content: "Paste your rendered content here (Ctrl+V or ⌘+V)...";
            color: #6a6a8a;
        }

        .output-section {
            position: relative;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .output-header h2 {
            font-size: 1.1rem;
            color: #c0c0d0;
        }

        .copy-btn {
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #5a52e0;
        }

        .copy-btn:active {
            background: #4a42c0;
        }

        .copy-btn.copied {
            background: #2ecc71;
        }

        .output-area {
            width: 100%;
            min-height: 300px;
            background: #0f0f1a;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            padding: 1.5rem;
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #c8d6e5;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: auto;
            resize: vertical;
        }

        .clear-btn {
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #c0392b;
        }

        .footer {
            margin-top: 2rem;
            color: #6a6a8a;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Paste to Markdown</h1>
    <p class="instructions">
        Copy rendered content (from a webpage, email, document, etc.) and paste it below.<br>
        The raw Markdown will appear instantly. All processing happens locally in your browser.
    </p>

    <div class="container">
        <div contenteditable="true" class="paste-area" id="pasteArea"></div>

        <div class="output-section">
            <div class="output-header">
                <h2>Markdown Output</h2>
                <div>
                    <button class="clear-btn" id="clearBtn">Clear</button>
                    <button class="copy-btn" id="copyBtn">Copy to Clipboard</button>
                </div>
            </div>
            <div class="output-area" id="outputArea"></div>
        </div>
    </div>

    <div class="footer">
        All conversion happens locally in your browser. No data is sent anywhere.
    </div>

    <script src="turndown.js"></script>
    <script>
        function initApp() {
            const pasteArea = document.getElementById('pasteArea');
            const outputArea = document.getElementById('outputArea');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');

            const turndownService = new TurndownService({
                headingStyle: 'atx',
                codeBlockStyle: 'fenced',
                emDelimiter: '*',
                bulletListMarker: '-',
                hr: '---'
            });

            // Add table support
            turndownService.addRule('table', {
                filter: 'table',
                replacement: function (content, node) {
                    const rows = node.querySelectorAll('tr');
                    if (rows.length === 0) return content;

                    let markdown = '';
                    const headerRow = rows[0];
                    const headerCells = headerRow.querySelectorAll('th, td');

                    const headers = [];
                    headerCells.forEach(cell => {
                        headers.push(cell.textContent.trim());
                    });
                    markdown += '| ' + headers.join(' | ') + ' |\n';
                    markdown += '| ' + headers.map(() => '---').join(' | ') + ' |\n';

                    for (let i = 1; i < rows.length; i++) {
                        const cells = rows[i].querySelectorAll('td, th');
                        const rowData = [];
                        cells.forEach(cell => {
                            rowData.push(cell.textContent.trim());
                        });
                        markdown += '| ' + rowData.join(' | ') + ' |\n';
                    }

                    return '\n' + markdown + '\n';
                }
            });

            // Add strikethrough support
            turndownService.addRule('strikethrough', {
                filter: ['del', 's', 'strike'],
                replacement: function (content) {
                    return '~~' + content + '~~';
                }
            });

            pasteArea.addEventListener('paste', function (e) {
                e.preventDefault();

                const html = e.clipboardData.getData('text/html');
                const text = e.clipboardData.getData('text/plain');

                let markdown;
                if (html) {
                    pasteArea.innerHTML = html;
                    markdown = turndownService.turndown(html);
                } else {
                    pasteArea.textContent = text;
                    markdown = text;
                }

                outputArea.textContent = markdown;
            });

            copyBtn.addEventListener('click', function () {
                const text = outputArea.textContent;
                if (!text) return;

                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = 'Copied!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = 'Copy to Clipboard';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                });
            });

            clearBtn.addEventListener('click', function () {
                pasteArea.innerHTML = '';
                outputArea.textContent = '';
            });
        }

        // Load turndown.js locally or fall back to CDN
        if (typeof TurndownService !== 'undefined') {
            initApp();
        } else {
            var s = document.createElement('script');
            s.src = 'https://unpkg.com/turndown@7.2.0/dist/turndown.js';
            s.onload = initApp;
            document.head.appendChild(s);
        }
    </script>
</body>
</html>
